# .beastmode/config.yaml

cli:
  dispatch-strategy: iterm2            # sdk | cmux | auto

github:
  enabled: true                     # Set to true by /beastmode setup-github
  project-name: "Beastmode Pipeline" # Projects V2 board name

hitl:
  model: haiku
  timeout: 30
  design: "always defer to human"
  plan: "auto-answer all questions, never defer to human"
  implement: "auto-answer all questions, never defer to human"
  validate: "auto-answer all questions, never defer to human"
  release: "auto-answer all questions, never defer to human"
